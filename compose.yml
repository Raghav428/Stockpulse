#######>>>>>>compose.yml<<<<<<######

services:


#>>>>>>>>PostgreSQL<<<<<<<<<#
  my_postgres:        # this is --name
    image: postgres   # this is the image
    environment:      # this is -e
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: stockpulse
    ports:            # this is -p
      - "5432:5432"
    volumes:          # this is -v
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 50



#>>>>>>>>>>>Redis<<<<<<<<<<<<#
  my_redis:
    image: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 10s
      timeout: 5s
      retries: 50



#>>>>>>>>Cassandra<<<<<<<<<<<<#
  my_cassandra:
    image: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra:/var/lib/cassandra
    healthcheck:
      test: ['CMD-SHELL', 'nodetool status']
      interval: 10s
      timeout: 5s
      retries: 50

#>>>>>>>>>FastAPI<<<<<<<<<<<<<#
  fastapi:
    build: .
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - .:/app
      - /app/.venv # <--- This tells Docker to use the container's .venv, NOT your local one!
    ports:
      - "8000:8000"
    depends_on:
      my_postgres:
        condition: service_healthy
      my_cassandra:
        condition: service_healthy
      my_redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 50

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    depends_on:
      my_kafka:
        condition: service_healthy
  
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    depends_on:
      my_kafka:
        condition: service_healthy
      my_cassandra:
        condition: service_healthy
      my_redis:
        condition: service_healthy


#>>>>>>>>>>>nginx<<<<<<<<<<<<<<#
  my_nginx:
    image: nginx
    volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
    - "80:80"
    depends_on:
      fastapi:
        condition: service_healthy

  
  my_kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://my_kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@my_kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 50

volumes:
  pgdata:             # declares the named volume
  cassandra: