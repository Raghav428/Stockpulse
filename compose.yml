#######>>>>>>compose.yml<<<<<<######

services:


#>>>>>>>>PostgreSQL<<<<<<<<<#
  my_postgres:        # this is --name
    image: postgres   # this is the image
    environment:      # this is -e
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: stockpulse
    ports:            # this is -p
      - "5432:5432"
    volumes:          # this is -v
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 30s
      timeout: 5s
      retries: 50



#>>>>>>>>>>>Redis<<<<<<<<<<<<#
  my_redis:
    image: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 30s
      timeout: 5s
      retries: 50



#>>>>>>>>Cassandra<<<<<<<<<<<<#
  cassandra:
    image: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra:/var/lib/cassandra
    healthcheck:
      test: ['CMD-SHELL', 'nodetool status']
      interval: 30s
      timeout: 5s
      retries: 50

#>>>>>>>>>FastAPI<<<<<<<<<<<<<#
  fastapi:
    build: .
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - .:/app
      - /app/.venv # <--- This tells Docker to use the container's .venv, NOT your local one!
    ports:
      - "8000:8000"
    depends_on:
      my_postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      my_redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health']
      interval: 30s
      timeout: 5s
      retries: 50


#>>>>>>>>>>>nginx<<<<<<<<<<<<<<#
  nginx:
    image: nginx
    volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
    - "80:80"
    depends_on:
      fastapi:
        condition: service_healthy


volumes:
  pgdata:             # declares the named volume
  cassandra: